# HTTP-only template — Certbot's nginx plugin adds TLS after:
#   sudo certbot --nginx -d <this-hostname> ...
# Public API for Vercel: browser needs https://<host>/api/...
# Replace __API_HOST__ with your API hostname (e.g. api.61c.com).

server {
    listen 80;
    listen [::]:80;
    server_name __API_HOST__;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    client_max_body_size 20m;

    location = / {
        default_type text/plain;
        return 200 "61c API\n";
    }

    location /api/ {
        proxy_pass http://127.0.0.1:5001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
